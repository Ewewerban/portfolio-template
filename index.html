<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links | Fork-and-Use Template</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="linktree-container">
        
        <header class="profile">
            <div class="avatar-placeholder">
                <span>FT</span> 
            </div>
            <h1>@YourUsername</h1>
            <p>Creating free fork-and-use templates for everyone. Web Developer & Open Source Enthusiast.</p>
        </header>

        <main class="links-wrapper">
            
            <a href="https://github.com/YOUR-USERNAME" target="_blank" class="link-card standard-link">
                <span class="link-icon">🐙</span>
                <span class="link-text">GitHub Profile</span>
            </a>

            <a href="https://YOUR-USERNAME.github.io/YOUR-CATALOG-REPO" target="_blank" class="link-card featured-link">
                <span class="link-icon">🔥</span>
                <span class="link-text">My Template Catalog</span>
                <span class="badge">HOT</span>
            </a>

            <a href="https://twitter.com/YOUR-USERNAME" target="_blank" class="link-card standard-link">
                <span class="link-icon">🐦</span>
                <span class="link-text">Follow me on X / Twitter</span>
            </a>

            <a href="https://linkedin.com/in/YOUR-USERNAME" target="_blank" class="link-card standard-link">
                <span class="link-icon">💼</span>
                <span class="link-text">Connect on LinkedIn</span>
            </a>

            <a href="mailto:your-email@example.com" target="_blank" class="link-card standard-link">
                <span class="link-icon">✉️</span>
                <span class="link-text">Contact Email</span>
            </a>

        </main>

        <footer class="linktree-footer">
            <p>Free Linktree Template by <a href="https://github.com/YOUR-USERNAME" target="_blank">@YourUsername</a></p>
        </footer>

    </div>

</body>
</html>
